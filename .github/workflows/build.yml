name: Build jOOQ DSL

on: [ pull_request ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          cache: gradle
          distribution: adopt
          java-version: 21

      - name: Build project
        run: ./gradlew clean build
